/* ─── HEADER ─── */
function Header({ step, selectedAge, onReset, onBackToTopics }) {
  const ageGroup = selectedAge ? AGE_GROUPS.find(g => g.id === selectedAge) : null;
  const c = ageGroup ? COLORS[ageGroup.colorKey] : null;
  return (
    <header className="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm">
      <div className="max-w-2xl mx-auto px-4 py-3">
        <div className="flex items-center gap-2 cursor-pointer group" onClick={onReset}>
          <span className="text-3xl">🦷</span>
          <div>
            <div className="text-lg font-black text-gray-800 leading-tight group-hover:text-sky-600 transition-colors">
              İlk Diş Hekimim
            </div>
            <div className="text-xs text-gray-400 font-medium">Çocuk Diş Sağlığı Rehberi</div>
          </div>
        </div>
        {step !== 'home' && ageGroup && (
          <nav className="mt-2 flex items-center gap-1.5 text-sm fade-in">
            <button onClick={onReset} className="text-gray-400 hover:text-gray-600 transition-colors text-xs">
              Ana Sayfa
            </button>
            <span className="text-gray-300">›</span>
            <button
              onClick={step === 'card' ? onBackToTopics : undefined}
              className={`px-2 py-0.5 rounded-full text-xs font-bold ${c.breadcrumb} ${step === 'card' ? 'cursor-pointer hover:opacity-75 transition-opacity' : 'cursor-default'}`}
            >
              {ageGroup.emoji} {ageGroup.label}
            </button>
          </nav>
        )}
      </div>
    </header>
  );
}

/* ─── HOME VIEW ─── */
function HomeView({ onSelectAge }) {
  return (
    <div className="pt-10 pb-8 fade-in">
      <div className="text-center mb-10">
        <div className="text-6xl mb-4">🦷</div>
        <h2 className="text-3xl sm:text-4xl font-black text-gray-800 mb-3 leading-tight">
          Çocuğunuz<br />
          <span className="text-sky-500">kaç yaşında?</span>
        </h2>
        <p className="text-gray-500 font-semibold text-base max-w-xs mx-auto">
          Yaşa özel uzman rehberine ulaşmak için bir seçenek tıklayın
        </p>
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        {AGE_GROUPS.map((group) => {
          const c = COLORS[group.colorKey];
          return (
            <button
              key={group.id}
              onClick={() => onSelectAge(group.id)}
              className={`card-hover text-left p-5 rounded-2xl border-2 ${c.buttonBg} ${c.buttonHover} ${c.border} transition-colors duration-150 focus:outline-none`}
            >
              <div className="flex items-center gap-4">
                <div className={`text-3xl w-14 h-14 flex items-center justify-center rounded-xl ${c.emojiBg} flex-shrink-0`}>
                  {group.emoji}
                </div>
                <div className="flex-1 min-w-0">
                  <div className={`text-xl font-extrabold ${c.text}`}>{group.label}</div>
                  <div className={`text-sm font-semibold ${c.subtext} mt-0.5`}>{group.desc}</div>
                </div>
                <span className={`${c.subtext} text-xl font-bold`}>›</span>
              </div>
            </button>
          );
        })}
      </div>

      <p className="text-center text-xs text-gray-400 mt-10 font-medium">
        👩‍⚕️ Bu rehber bir çocuk diş hekimi tarafından hazırlanmıştır ve bir tavsiye niteliği taşımaktadır, doktorunuzla görüşerek daha fazla bilgi alabilirsiniz.
      </p>
    </div>
  );
}

/* ─── TOPICS VIEW ─── */
function TopicsView({ ageId, onSelectTopic, onBack }) {
  const ageGroup = AGE_GROUPS.find(g => g.id === ageId);
  const c = COLORS[ageGroup.colorKey];
  const topics = TOPICS[ageId] || [];
  return (
    <div className="pt-8 pb-8 fade-in">
      <div className={`${c.headerBg} rounded-2xl p-5 mb-8 border-2 ${c.border}`}>
        <div className="flex items-center gap-4">
          <span className="text-5xl">{ageGroup.emoji}</span>
          <div>
            <h2 className={`text-2xl font-black ${c.text}`}>{ageGroup.label}</h2>
            <p className={`${c.subtext} font-semibold text-sm`}>{ageGroup.desc}</p>
          </div>
        </div>
      </div>

      <h3 className="text-lg font-extrabold text-gray-700 mb-4 text-center">
        Hangi konuyu merak ediyorsunuz? 🔍
      </h3>

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        {topics.map((topic) => (
          <button
            key={topic.id}
            onClick={() => onSelectTopic(topic.id)}
            className={`card-hover text-left p-4 rounded-xl border-2 ${c.buttonBg} ${c.buttonHover} ${c.border} transition-colors duration-150 focus:outline-none`}
          >
            <div className="flex items-center gap-3">
              <span className="text-2xl">{topic.emoji}</span>
              <span className={`font-bold ${c.text} flex-1`}>{topic.label}</span>
              <span className={`${c.subtext} font-bold`}>›</span>
            </div>
          </button>
        ))}
      </div>

      <button
        onClick={onBack}
        className="mt-5 w-full py-3 rounded-xl border-2 border-gray-200 text-gray-500 font-bold hover:bg-gray-50 transition-colors"
      >
        ← Geri Dön
      </button>
    </div>
  );
}

/* ─── INFO CARD VIEW ─── */
function InfoCardView({ ageId, topicId, onBack }) {
  const ageGroup = AGE_GROUPS.find(g => g.id === ageId);
  const c = COLORS[ageGroup.colorKey];
  const topic = TOPICS[ageId].find(t => t.id === topicId);
  const card = topic.card;
  return (
    <div className="pt-8 pb-8 fade-in">
      <div className={`rounded-2xl border-2 ${c.border} overflow-hidden shadow-lg`}>
        {/* Card Header */}
        <div className={`${c.headerBg} p-6 border-b ${c.border}`}>
          <div className="flex items-start gap-4">
            <div className={`text-4xl w-14 h-14 flex items-center justify-center rounded-xl ${c.emojiBg} flex-shrink-0`}>
              {topic.emoji}
            </div>
            <h2 className={`text-xl font-black ${c.text} leading-snug pt-1`}>
              {card.title}
            </h2>
          </div>
        </div>

        {/* Card Body */}
        <div className="bg-white p-6 space-y-6">
          {/* Summary */}
          <p className="text-gray-700 font-semibold leading-relaxed">
            {card.summary}
          </p>

          {/* Tips */}
          <div>
            <h3 className={`font-extrabold ${c.text} mb-3 flex items-center gap-2`}>
              <span>📋</span> Önemli Bilgiler
            </h3>
            <ul className="space-y-3">
              {card.tips.map((tip, i) => {
                const tipText = typeof tip === 'string' ? tip : tip.text;
                const tipImg  = typeof tip === 'string' ? null : tip.img;
                return (
                  <li key={i} className="flex items-start gap-3">
                    <span className={`mt-1.5 ${c.dot} w-2 h-2 rounded-full flex-shrink-0 inline-block`} />
                    <span className="text-gray-600 font-semibold leading-snug text-sm">
                      {tipText}
                      {tipImg && (
                        <img
                          src={tipImg}
                          alt={tipText}
                          className="mt-2 block rounded-xl max-w-[220px] border border-gray-100 shadow-sm"
                        />
                      )}
                    </span>
                  </li>
                );
              })}
            </ul>
          </div>

          {/* Doctor Note */}
          <div className={`${c.noteBg} border-l-4 ${c.noteBorder} p-4 rounded-r-xl`}>
            <div className={`font-extrabold ${c.text} text-sm mb-1.5 flex items-center gap-1.5`}>
              <span>👩‍⚕️</span> Uzman Notu
            </div>
            <p className={`${c.noteText} text-sm font-semibold leading-relaxed`}>
              {card.note}
            </p>
          </div>
        </div>
      </div>

      <button
        onClick={onBack}
        className={`mt-4 w-full py-3 rounded-xl border-2 ${c.border} ${c.text} ${c.buttonBg} ${c.buttonHover} font-bold transition-colors`}
      >
        ← Diğer Konular
      </button>
    </div>
  );
}

/* ─── APP ─── */
function App() {
  const [step, setStep] = useState('home');
  const [selectedAge, setSelectedAge] = useState(null);
  const [selectedTopic, setSelectedTopic] = useState(null);

  const handleSelectAge = (ageId) => {
    setSelectedAge(ageId);
    setSelectedTopic(null);
    setStep('topics');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const handleSelectTopic = (topicId) => {
    setSelectedTopic(topicId);
    setStep('card');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const handleBackToHome = () => {
    setStep('home');
    setSelectedAge(null);
    setSelectedTopic(null);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const handleBackToTopics = () => {
    setStep('topics');
    setSelectedTopic(null);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <div className="min-h-screen flex flex-col">
      <Header
        step={step}
        selectedAge={selectedAge}
        onReset={handleBackToHome}
        onBackToTopics={handleBackToTopics}
      />
      <main className="max-w-2xl mx-auto px-4 w-full flex-1">
        {step === 'home'   && <HomeView onSelectAge={handleSelectAge} />}
        {step === 'topics' && <TopicsView ageId={selectedAge} onSelectTopic={handleSelectTopic} onBack={handleBackToHome} />}
        {step === 'card'   && <InfoCardView ageId={selectedAge} topicId={selectedTopic} onBack={handleBackToTopics} />}
      </main>
      <footer className="text-center py-6 text-xs text-gray-400 font-medium">
        © 2025 İlk Diş Hekimim · Uzman Pedodonti Rehberi
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
